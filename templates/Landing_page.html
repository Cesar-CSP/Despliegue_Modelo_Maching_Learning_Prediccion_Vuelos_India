<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CLA Flight Intelligence – Predicción Economy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        form {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #bbb;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
        #result {
            margin-top: 25px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<h1>Predicción de Precio – Clase Economy</h1>

<form id="predictForm">

    <label>Aerolínea (airline)</label>
    <select name="airline">
        <option value="">(sin especificar)</option>
        <option value="Vistara">Vistara</option>
        <option value="AirIndia">AirIndia</option>
        <option value="Indigo">Indigo</option>
        <option value="GO FIRST">GO FIRST</option>
        <option value="Others">Others</option>
    </select>

    <label>Ciudad Origen (from)</label>
    <select name="from">
        <option value="">(sin especificar)</option>
        <option value="Delhi">Delhi</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Bangalore">Bangalore</option>
        <option value="Kolkata">Kolkata</option>
        <option value="Hyderabad">Hyderabad</option>
        <option value="Chennai">Chennai</option>
    </select>

    <label>Ciudad Destino (to)</label>
    <select name="to">
        <option value="">(sin especificar)</option>
        <option value="Delhi">Delhi</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Bangalore">Bangalore</option>
        <option value="Kolkata">Kolkata</option>
        <option value="Hyderabad">Hyderabad</option>
        <option value="Chennai">Chennai</option>
    </select>

    <label>Categoría Hora Salida (dep_time_cat)</label>
    <select name="dep_time_cat">
        <option value="">(sin especificar)</option>
        <option value="Night">Night</option>
        <option value="Evening">Evening</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
        <option value="Late Night">Late Night</option>
        <option value="Early Morning">Early Morning</option>
    </select>

    <label>Categoría Hora Llegada (arr_time_cat)</label>
    <select name="arr_time_cat">
        <option value="">(sin especificar)</option>
        <option value="Night">Night</option>
        <option value="Evening">Evening</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
        <option value="Late Night">Late Night</option>
        <option value="Early Morning">Early Morning</option>
    </select>

    <label>Número de Escalas (stop_num)</label>
    <select name="stop_num">
        <option value="">(sin especificar)</option>
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
    </select>

    <label>Días de Antelación (days_left)</label>
    <input type="number" name="days_left" step="1">

    <label>Duración (duration(h))</label>
    <input type="number" name="duration(h)" step="0.1">

    <button type="submit">Predecir Precio</button>
</form>

<div id="result"></div>

<script>
document.getElementById("predictForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(e.target);
    const params = new URLSearchParams(formData);

    const response = await fetch(`/api/v1/predict?${params.toString()}`);
    const data = await response.json();

    document.getElementById("result").innerHTML =
        `Precio estimado: <strong>${data.predictions.toFixed(2)} INR</strong>` +
        (data.warning ? `<br><small>${data.warning}</small>` : "");
});
</script>

</body>
</html>
